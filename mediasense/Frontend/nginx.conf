# nginx.conf — adapté pour Render
# Le backend n'est plus sur le même réseau Docker,
# on utilise une variable d'environnement BACKEND_URL injectée par Render.

server {
    listen 80;
    server_name _;

    # Fichiers statiques
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend Render
    # BACKEND_URL_PLACEHOLDER sera remplacé au démarrage par docker-entrypoint.sh
    location /api/ {
        proxy_pass         BACKEND_URL_PLACEHOLDER;
        proxy_http_version 1.1;

        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        client_max_body_size 500M;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }
}