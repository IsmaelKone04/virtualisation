<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a0033, #4b0082);
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .logo {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 500;
    }

    .input-box {
      margin: 15px 0;
      text-align: left;
    }

    .input-box label {
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }

    .input-box input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.4);
      background: transparent;
      color: white;
      outline: none;
    }

    .forgot {
      text-align: left;
      font-size: 13px;
      margin: 10px 0;
      cursor: pointer;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #a855f7, #9333ea);
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .login-btn:hover {
      opacity: 0.85;
    }

    .signup {
      margin-top: 20px;
      font-size: 14px;
    }

    .signup span {
      font-weight: bold;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="logo">GIS</div>
    <h2>Welcome Back, Ismael</h2>

    <div class="input-box">
      <label>Email address</label>
      <input type="email" placeholder="Enter email">
    </div>

    <div class="input-box">
      <label>Password</label>
      <input type="password" placeholder="Enter password">
    </div>

    <div class="forgot">Forget Password ?</div>

    <button class="login-btn">Login</button>

    <div class="signup">
      Are You New Member ? <span>Sign UP</span>
    </div>
  </div>

</body>
</html>
