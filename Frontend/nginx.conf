# ── nginx.conf — Proxy Frontend → Backend ────────────────────────
# Le frontend tourne sur le port 80.
# Toutes les requêtes qui commencent par /api sont redirigées
# vers le container backend sur le port 3000.

server {
    listen 80;
    server_name _;

    # ── Fichiers statiques (HTML, CSS, JS) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy vers le backend Node.js ──
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Support des fichiers volumineux (audio jusqu'à 500 MB)
        client_max_body_size 500M;

        # Timeout élevé pour les longues transcriptions
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}